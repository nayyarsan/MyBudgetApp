name: Deep Reverse Engineering — Generate Documentation

# Trigger on every push to main that touches functional Dart source files
# (excludes Drift/Freezed generated files).
# Also allows manual runs via workflow_dispatch.
on:
  push:
    branches: [main]
    paths:
      - 'lib/**/*.dart'
      - '!lib/**/*.g.dart'
      - '!lib/**/*.freezed.dart'
      - '!lib/**/*.mocks.dart'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false
        default: 'Manual documentation refresh'

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-docs:
    name: Run Deep Reverse Engineering
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so we can diff against previous commit
          fetch-depth: 2

      # -----------------------------------------------------------------------
      # Verify that at least one non-generated .dart file changed
      # (avoids running for pushes that only change generated files
      #  even when the path filter fires on other files in the same push).
      # -----------------------------------------------------------------------
      - name: Detect functional Dart changes
        id: detect
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Manual run — treating all files as changed."
            exit 0
          fi

          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'lib/' \
            | grep '\.dart$' \
            | grep -v '\.g\.dart$' \
            | grep -v '\.freezed\.dart$' \
            | grep -v '\.mocks\.dart$' \
            || true)

          if [ -n "$CHANGED" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Functional Dart files changed:"
            echo "$CHANGED"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No functional Dart changes — skipping documentation generation."
          fi

      # -----------------------------------------------------------------------
      # Set up runtime dependencies
      # -----------------------------------------------------------------------
      - name: Set up Python
        if: steps.detect.outputs.has_changes == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Flutter
        if: steps.detect.outputs.has_changes == 'true'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.3'
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        if: steps.detect.outputs.has_changes == 'true'
        run: flutter pub get

      - name: Generate Drift code
        if: steps.detect.outputs.has_changes == 'true'
        run: dart run build_runner build --delete-conflicting-outputs

      # -----------------------------------------------------------------------
      # Stage 0–7: Run the reverse-engineering documentation generator
      # -----------------------------------------------------------------------
      - name: Run documentation generator (Stages 0–7)
        if: steps.detect.outputs.has_changes == 'true'
        run: python3 .github/scripts/generate_docs.py

      # -----------------------------------------------------------------------
      # Open (or update) a pull request with the generated docs
      # -----------------------------------------------------------------------
      - name: Create or update documentation PR
        if: steps.detect.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: docs/reverse-engineering-auto
          delete-branch: false
          commit-message: |
            docs: regenerate reverse-engineering documentation

            Triggered by commit ${{ github.sha }} on branch ${{ github.ref_name }}.
          title: 'docs: generated reverse engineering documentation'
          body: |
            ## Deep Reverse Engineering Documentation

            This PR was automatically generated by the **Deep Reverse Engineering**
            workflow in response to functional Dart code changes.

            ### What changed
            Triggered by commit: `${{ github.sha }}`
            Branch: `${{ github.ref_name }}`
            Run: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            ### Generated files
            All documentation lives under `.github/docs/`:

            | File | Description |
            |------|-------------|
            | `_manifest.json` | Repo metadata and file inventory |
            | `_inventory.json` | Per-file role and analysis state |
            | `intermediate/signatures/` | Structural skeleton per cluster |
            | `intermediate/dependency_graph.json` | Provider chains and cross-feature imports |
            | `intermediate/data_model.json` | Drift tables + DAO queries + Firestore mapping |
            | `intermediate/logic_summaries/` | Per-file logic summaries |
            | `intermediate/business_intent.json` | User-facing intent per feature |
            | `files.md` | File-level reference grouped by cluster |
            | `features/*.md` | One doc per feature (10 files) |
            | `data_model.md` | Full data model with ER relationships |
            | `flows/*.md` | 6 user-flow walkthroughs |
            | `README.md` | Architecture overview |

            ### Completion checklist
            - [x] `_manifest.json`
            - [x] `_inventory.json` with all phases marked complete
            - [x] `intermediate/signatures/` — one file per cluster
            - [x] `intermediate/dependency_graph.json`
            - [x] `intermediate/data_model.json`
            - [x] `intermediate/logic_summaries/` — one file per cluster
            - [x] `intermediate/business_intent.json`
            - [x] `files.md`
            - [x] `features/` — 10 feature docs
            - [x] `data_model.md`
            - [x] `flows/` — 6 flow files
            - [x] `README.md`
          labels: documentation
          add-paths: .github/docs/**
